<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html/Css Form</title>
</head>
<style>
    * {
        box-sizing: border-box;
    }

    body {
        background-color: rgb(29, 187, 244);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    .form-container {
        background-color: rgb(32, 86, 204);
        padding: 40px;
        margin-top: 50px;
        border-radius: 20px;
        text-align: center;
        max-width: 450px;
        width: 90%;
        margin: 50px auto;
    }

    h2 {
        color: white;
        position: relative;
        display: inline-block;
    }

    h2::after {
        content: "";
        display: block;
        width: 100%;
        height: 3px;
        background: white;
        margin-top: 6px;
        position: relative;
    }

    h2::before {
        content: "";
        width: 8px;
        height: 8px;
        background: white;
        position: absolute;
        right: -12px;
        bottom: -4px;
    }

    label {
        color: white;
        font-size: 17px;
        font-weight: bold;
        padding: 8px;
        margin-top: 10px;

    }

    input {
        margin-left: 30px;
        margin-top: 20px;
        padding: 7px;
        font-family: sans-serif;
        border: 2px solid  rgb(16, 95, 124);
    }

    input:focus {
        outline: 0;
        border-color:  rgb(20, 112, 232);
        box-shadow: 0 0 10px rgb(20, 112, 232);
    }

    .btn-sub {
        padding: 10px;
        background-color: rgb(22, 22, 101);
        border-color: white;
        border-radius: 10px;
        color: white;
        transition: 0.2s;
        cursor: pointer;
    }

    .btn-sub:hover {
        background-color: rgb(20, 112, 232);
    }
</style>

<body>
    <div class="form-container">
        <h2>Simple Html/Css Form</h2>

        <form>
            <label for="userName">Name :</label><br>
            <input type="text" id="userName" name="username" placeholder="Enter Your Name" required><br><br>

            <label for="userEmail">Email :</label><br>
            <input type="email" id="userEmail" name="user_email" placeholder="Enter Your Email"
                title="Please enter @gmail" required><br><br>


            <label for="userPhone">Contact :</label><br>
            <input type="tel" id="userPhone" name="user_phone" placeholder="Enter Your Number" pattern="[0-9]*"
                title="Please enter numbers only" required><br><br>

            <input type="submit" value="Submit" class="btn-sub">
        </form>
    </div>
</body>

</html>
